<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>คำมอด — ราชาทุ่งสาป</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;700&family=Kanit:wght@300;400;700;900&display=swap');
*{box-sizing:border-box;margin:0;padding:0;user-select:none;-webkit-touch-callout:none;touch-action:none;}
body{background:#000;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:'Kanit',sans-serif;overflow:hidden;}

/* ── GAME CONTAINER ─────────────────────────── */
#G{position:relative;width:360px;height:620px;background:#0a0a0a;overflow:hidden;border:1px solid #1a1a1a;box-shadow:0 0 60px rgba(180,0,0,.1);}

/* ── FADE ───────────────────────────────────── */
#fade{position:absolute;inset:0;background:#000;z-index:9500;pointer-events:none;transition:opacity .5s;}

/* ── TITLE ──────────────────────────────────── */
#title{position:absolute;inset:0;background:radial-gradient(ellipse at 50% 35%,#1a0500,#000);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9000;}
.t-main{font-size:60px;font-weight:900;color:#fff;letter-spacing:8px;text-shadow:0 0 40px rgba(200,0,0,.8);animation:tglow 2s ease-in-out infinite alternate;}
@keyframes tglow{from{text-shadow:0 0 20px rgba(200,0,0,.5);}to{text-shadow:0 0 60px rgba(200,0,0,1),0 0 100px rgba(200,0,0,.3);}}
.t-sub{font-size:11px;color:#700;letter-spacing:5px;margin-top:6px;font-weight:300;}
.t-hr{width:100px;height:1px;background:linear-gradient(90deg,transparent,#700,transparent);margin:16px 0;}
.t-eye{font-size:28px;margin-bottom:14px;animation:eblink 3s infinite;}
@keyframes eblink{0%,88%,100%{transform:scaleY(1);}93%{transform:scaleY(.1);}}
#btn-start{background:transparent;border:1px solid #600;color:#c00;font-family:'Kanit';font-size:13px;font-weight:700;padding:11px 36px;letter-spacing:3px;cursor:pointer;animation:pulse 1.4s infinite;}
#btn-start:active{background:#200;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.4;}}
.t-ver{position:absolute;bottom:10px;font-size:9px;color:#222;letter-spacing:2px;}

/* ── HUD ────────────────────────────────────── */
#hud{position:absolute;top:0;left:0;right:0;height:34px;background:rgba(0,0,0,.92);border-bottom:1px solid #200;z-index:500;display:none;align-items:center;padding:0 8px;gap:6px;}
#ch-tag{font-size:8px;color:#500;letter-spacing:2px;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
#hp-wrap{width:55px;height:5px;background:#1a0000;border:1px solid #300;border-radius:3px;overflow:hidden;flex-shrink:0;}
#hp-fill{height:100%;background:linear-gradient(90deg,#800,#f00);transition:width .3s;}
#hud-items{font-size:10px;color:#c8a000;flex-shrink:0;}
/* checkpoint badge */
#ckpt-badge{position:absolute;top:34px;left:50%;transform:translateX(-50%);background:rgba(0,100,0,.85);border:1px solid #0f0;border-radius:4px;padding:3px 12px;font-size:10px;color:#8f8;letter-spacing:1px;z-index:600;opacity:0;transition:opacity .4s;pointer-events:none;}

/* ── SCENE BASE ─────────────────────────────── */
.sc{position:absolute;left:0;right:0;top:34px;bottom:110px;display:none;overflow:hidden;}
.sc.on{display:block;}

/* ── TEXTBOX ─────────────────────────────────── */
#tb{position:absolute;bottom:0;left:0;right:0;height:110px;background:rgba(4,2,2,.97);border-top:1px solid #300;z-index:2000;padding:8px 12px 6px;display:none;flex-direction:column;}
#tb-top{display:flex;align-items:center;gap:7px;margin-bottom:5px;}
#tb-ico{width:28px;height:28px;border-radius:50%;border:1.5px solid #400;background:#1a1209;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
#tb-name{font-size:10px;color:#c00;letter-spacing:2px;font-weight:700;}
#tb-txt{font-size:12.5px;color:#ddd;line-height:1.6;flex:1;font-family:'Sarabun';font-weight:300;overflow:hidden;}
#tb-arr{position:absolute;bottom:6px;right:10px;font-size:14px;color:#500;animation:blink .8s infinite;cursor:pointer;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.1;}}
#tb-choices{display:none;flex-direction:column;gap:4px;margin-top:4px;}
.copt{background:rgba(25,0,0,.8);border:1px solid #400;color:#ccc;padding:5px 10px;border-radius:3px;font-family:'Sarabun';font-size:11.5px;cursor:pointer;text-align:left;transition:all .15s;}
.copt:active{background:#300;color:#fff;}

/* ── CONTROLS ────────────────────────────────── */
#ctrls{position:absolute;bottom:115px;left:0;right:0;height:0;display:none;justify-content:space-between;padding:0 14px;z-index:1500;align-items:flex-end;pointer-events:none;}
.dpad{display:grid;grid-template-columns:repeat(3,38px);grid-template-rows:repeat(2,38px);gap:4px;pointer-events:all;}
.dbtn{width:38px;height:38px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.09);border-radius:8px;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.35);font-size:15px;cursor:pointer;-webkit-tap-highlight-color:transparent;}
.dbtn:active{background:rgba(255,255,255,.14);}
#act-side{display:flex;flex-direction:column;align-items:center;gap:5px;pointer-events:all;}
#btn-act{width:58px;height:58px;background:rgba(130,0,0,.65);border:2px solid #c00;border-radius:50%;color:#fff;font-size:8px;font-weight:700;text-align:center;display:none;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 0 16px rgba(200,0,0,.28);-webkit-tap-highlight-color:transparent;line-height:1.2;}
#btn-act:active{transform:scale(.93);}
#act-lbl{font-size:8px;color:#444;pointer-events:none;}

/* ── STEALTH/FIGHT HUD ────────────────────────── */
#stealthbar{position:absolute;top:2px;right:6px;width:70px;height:5px;background:#111;border:1px solid #333;border-radius:3px;overflow:hidden;z-index:30;display:none;}
#stealth-fill{height:100%;background:linear-gradient(90deg,#00f,#08f);transition:width .2s;}
#alert-badge{position:absolute;top:38px;right:8px;font-size:9px;font-weight:700;letter-spacing:1px;z-index:40;display:none;}

/* ── PIXEL SPRITE ────────────────────────────── */
.spr{position:absolute;width:24px;height:40px;}
.spr-body{position:absolute;bottom:0;left:2px;width:20px;height:22px;background:#3a2a10;border:2px solid #000;border-radius:3px 3px 0 0;}
.spr-head{position:absolute;top:0;left:1px;width:22px;height:18px;background:#c87030;border:2px solid #000;border-radius:50% 50% 35% 35%;}
.spr-el{position:absolute;width:4px;height:4px;background:#000;border-radius:50%;top:6px;}
.spr-el.L{left:4px;}.spr-el.R{right:4px;}
.spr-mouth{position:absolute;bottom:4px;left:50%;transform:translateX(-50%);width:9px;height:2px;background:#500;border-radius:2px;}
.spr-hat{position:absolute;top:-8px;left:-1px;width:24px;height:9px;background:#1a1000;border:2px solid #000;border-radius:3px 3px 0 0;}
.spr-leg{position:absolute;bottom:-11px;width:9px;height:12px;background:#2a1a08;border:2px solid #000;border-radius:0 0 3px 3px;transform-origin:top center;}
.spr-leg.L{left:2px;}.spr-leg.R{right:2px;}
.km-leg-l.walk,.km-leg-r.walk,.spr-leg.walk{animation-play-state:running;}
.walk .spr-leg.L{animation:wL .28s infinite;}.walk .spr-leg.R{animation:wR .28s infinite;}
@keyframes wL{0%,100%{transform:rotate(-22deg);}50%{transform:rotate(22deg);}}
@keyframes wR{0%,100%{transform:rotate(22deg);}50%{transform:rotate(-22deg);}}
.talk .spr-mouth{animation:mtkl .11s infinite alternate;}
@keyframes mtkl{from{height:2px;}to{height:8px;border-radius:50%;}}
/* crouching stealth */
.spr.crouch .spr-body{height:14px;}
.spr.crouch .spr-head{top:4px;}
.spr.crouch .spr-leg{display:none;}

/* ── NPC sprite ──────────────────────────────── */
.npc-spr{position:absolute;cursor:pointer;}
.npc-bubble{position:absolute;top:-22px;left:50%;transform:translateX(-50%);background:#111;border:1px solid #400;border-radius:3px;padding:2px 6px;font-size:9px;color:#c00;white-space:nowrap;animation:bb 1.2s ease-in-out infinite;display:none;}
@keyframes bb{0%,100%{transform:translateX(-50%) translateY(0);}50%{transform:translateX(-50%) translateY(-3px);}}

/* ── SCENES ──────────────────────────────────── */
/* SC01: highway */
#sc01{background:linear-gradient(180deg,#04000a,#0c0008 40%,#080402 70%,#040200);}
#sc01 .sky-red{position:absolute;top:0;left:0;right:0;height:45%;background:radial-gradient(ellipse at 50% 0%,rgba(160,0,0,.32),transparent 70%);}
#sc01 .road{position:absolute;bottom:0;left:0;right:0;height:130px;background:linear-gradient(180deg,#111,#080808);border-top:2px solid #1a1a1a;}
.rd-line{position:absolute;left:50%;width:4px;background:#232323;transform:translateX(-50%);animation:rdfl .2s linear infinite;}
@keyframes rdfl{from{top:-40px;}to{top:130px;}}
#sc01 .cabin{position:absolute;bottom:0;left:16px;right:16px;height:75px;background:linear-gradient(180deg,#1a1209,#0d0d0d);border-top:2px solid #222;border-radius:4px 4px 0 0;}
#sc01 .wheel{position:absolute;bottom:18px;left:50%;transform:translateX(-50%);width:55px;height:55px;border:5px solid #2a2a2a;border-bottom-color:transparent;border-radius:50%;}
#km-drive{position:absolute;bottom:75px;left:50%;transform:translateX(-50%);}

/* SC02: FPV */
#sc02{background:#04030a;}
#sc02 .ground{position:absolute;bottom:0;left:0;right:0;height:110px;background:linear-gradient(180deg,#0a0a0a,#000);border-top:2px solid #111;}
#shadow-ent{position:absolute;right:-200px;top:20px;width:90px;height:210px;transition:right 1.8s ease-in-out;}
.ent-body{width:100%;height:100%;background:rgba(0,0,0,.92);filter:blur(6px);border-radius:40% 40% 20% 20%;}
.ent-eye{position:absolute;width:9px;height:9px;background:#f00;border-radius:50%;top:30px;box-shadow:0 0 14px #f00;animation:eg .35s infinite alternate;}
@keyframes eg{from{box-shadow:0 0 7px #f00;}to{box-shadow:0 0 22px #f00,0 0 40px rgba(255,0,0,.3);}}
.ent-eye.L{left:18px;}.ent-eye.R{right:18px;}
#fpv-chick{position:absolute;font-size:55px;top:70px;left:145px;display:none;animation:chfly .7s ease-in forwards;}
@keyframes chfly{0%{transform:translate(0,0) rotate(0);opacity:1;}100%{transform:translate(-40px,-110px) rotate(-360deg);opacity:0;font-size:16px;}}

/* SC03: prison */
#sc03{background:#0a0806;}
.stone{position:absolute;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 38px,rgba(18,10,4,.8) 38px,rgba(18,10,4,.8) 40px),repeating-linear-gradient(90deg,transparent,transparent 48px,rgba(18,10,4,.8) 48px,rgba(18,10,4,.8) 50px);background-color:#0e0b08;}
#prison-bars{position:absolute;inset:0;background:repeating-linear-gradient(90deg,rgba(48,36,18,.95) 0,rgba(48,36,18,.95) 11px,transparent 11px,transparent 48px);z-index:15;transition:transform 1.3s ease-in-out,opacity .7s;}
#prison-bars.open{transform:translateY(-110%);opacity:0;}
.cell-floor{position:absolute;bottom:0;left:0;right:0;height:55px;background:linear-gradient(180deg,#0d0906,#050403);}
.ptorch{position:absolute;top:18px;font-size:20px;animation:tf .11s infinite alternate;z-index:20;}
@keyframes tf{from{opacity:.6;}to{opacity:1;filter:brightness(1.4);}}
#hammer-obj{position:absolute;bottom:65px;left:100px;font-size:38px;display:none;animation:flt 1.8s ease-in-out infinite;filter:drop-shadow(0 0 10px rgba(255,140,0,.45));cursor:pointer;z-index:30;}
@keyframes flt{0%,100%{transform:translateY(0);}50%{transform:translateY(-7px);}}

/* lock overlay */
#lock-ov{position:absolute;inset:0;background:rgba(0,0,0,.96);z-index:4000;display:none;flex-direction:column;align-items:center;justify-content:center;gap:12px;}
.lk-title{font-size:14px;color:#c00;letter-spacing:3px;}
.lk-desc{font-size:9px;color:#555;text-align:center;}
#lk-bar{position:relative;width:250px;height:22px;background:#111;border:2px solid #333;border-radius:20px;overflow:hidden;}
#lk-zone{position:absolute;height:100%;width:52px;background:rgba(0,200,0,.25);border:1px solid #0c0;border-radius:20px;}
#lk-needle{position:absolute;top:0;width:7px;height:100%;background:#f00;border-radius:20px;box-shadow:0 0 7px #f00;}
#lk-btn{padding:11px 40px;background:#900;border:2px solid #f00;color:#fff;font-family:'Kanit';font-weight:700;font-size:13px;border-radius:7px;cursor:pointer;letter-spacing:1px;}
#lk-combo{display:flex;gap:7px;}
.cl{width:11px;height:11px;border-radius:50%;background:#1a0000;border:1px solid #400;}
.cl.on{background:#0f0;box-shadow:0 0 7px #0f0;border-color:#0f0;}
#lk-tries{font-size:10px;color:#444;}

/* SC04-SC06: scrollable world */
.world-sc{background:linear-gradient(180deg,#020802,#0a1005 50%,#050803);}
.world-floor{position:absolute;bottom:0;left:0;right:0;height:50px;background:linear-gradient(180deg,#0a1005,#050803);border-top:2px solid #0d1508;}
.w-scroll{position:absolute;bottom:0;left:0;height:100%;}
.w-tree{position:absolute;bottom:50px;font-size:28px;opacity:.65;}
.w-house{position:absolute;bottom:50px;}
.h-roof{width:0;height:0;border-left:34px solid transparent;border-right:34px solid transparent;border-bottom:28px solid #1a0a05;margin-left:-4px;}
.h-body{width:56px;height:46px;background:#1a1208;border:2px solid #222;position:relative;}
.h-win{position:absolute;top:10px;left:50%;transform:translateX(-50%);width:14px;height:12px;background:rgba(200,160,0,.2);border:1px solid #c8a000;}

/* SC07: ritual */
#sc07{background:#04000a;}
.r-ground{position:absolute;bottom:0;left:0;right:0;height:75px;background:linear-gradient(180deg,#090508,#030203);border-top:2px solid #1a0020;}
.r-candle{position:absolute;bottom:74px;font-size:22px;animation:cf .13s infinite alternate;}
@keyframes cf{from{opacity:.65;}to{opacity:1;filter:brightness(1.35);}}
#r-altar{position:absolute;bottom:76px;left:50%;transform:translateX(-50%);width:75px;height:75px;border:2px solid rgba(140,0,140,.4);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:28px;animation:rspin 9s linear infinite;}
@keyframes rspin{from{transform:translateX(-50%) rotate(0);}to{transform:translateX(-50%) rotate(360deg);}}

/* SC08: rice field with stealth */
#sc08{background:#020802;}
#field-wrap{position:absolute;inset:0;overflow:hidden;}
#field-floor{position:absolute;bottom:0;left:0;right:0;height:48px;background:#050805;}
#rice-layer{position:absolute;bottom:46px;left:0;height:155px;}
.r-stalk{position:absolute;bottom:0;width:5px;background:linear-gradient(180deg,#1a3a10,#0d1f08);border-radius:2px 2px 0 0;}
.r-stalk::after{content:'';position:absolute;top:0;left:-3px;width:10px;height:4px;background:#243c18;border-radius:50%;}
#field-fog{position:absolute;inset:0;background:linear-gradient(180deg,rgba(2,10,2,.96) 0%,rgba(2,10,2,.35) 55%,transparent 70%);pointer-events:none;z-index:8;}
.yant-pick{position:absolute;bottom:56px;font-size:19px;z-index:12;animation:flt 1.7s ease-in-out infinite;filter:drop-shadow(0 0 7px rgba(200,200,0,.6));}
.obs{position:absolute;bottom:46px;width:16px;height:15px;background:#1a1a14;border:2px solid #2a2a20;border-radius:3px;z-index:10;}
#praai-spr{position:absolute;bottom:46px;width:26px;height:42px;z-index:18;}
.praai-inner{width:100%;height:100%;background:#030103;border:2px solid #300;border-radius:5px;position:relative;}
.p-eye{position:absolute;width:6px;height:6px;background:#f00;border-radius:50%;top:9px;box-shadow:0 0 10px #f00;animation:eg .4s infinite alternate;}
.p-eye.L{left:2px;}.p-eye.R{right:2px;}
#field-stam{position:absolute;top:2px;left:4px;width:76px;height:4px;background:#1a0000;border:1px solid #300;border-radius:3px;z-index:30;overflow:hidden;}
#stam-fill{height:100%;background:linear-gradient(90deg,#080,#0f0);transition:width .1s;}
#field-yants{position:absolute;top:2px;right:4px;font-size:10px;color:#c8a000;z-index:30;}
/* hide/bush spots */
.bush-hide{position:absolute;bottom:46px;font-size:32px;z-index:11;opacity:.85;filter:drop-shadow(0 0 6px rgba(0,200,0,.5));animation:bush-pulse 2s ease-in-out infinite;}
@keyframes bush-pulse{0%,100%{filter:drop-shadow(0 0 4px rgba(0,200,0,.4));}50%{filter:drop-shadow(0 0 12px rgba(0,255,0,.7));}}
.bush-hide::after{content:'HIDE';position:absolute;top:-14px;left:50%;transform:translateX(-50%);font-size:7px;color:rgba(0,255,0,.6);font-family:'Kanit';letter-spacing:1px;white-space:nowrap;}

/* SC09: boss */
#sc09{background:#050200;}
.boss-bg{position:absolute;inset:0;background:radial-gradient(ellipse at 50% 40%,#1a0500,#000);}
.boss-pile{position:absolute;bottom:0;left:0;right:0;height:75px;background:linear-gradient(180deg,#221800,#0d0800);border-top:2px solid #1a1000;}
#boss-spr{position:absolute;top:25px;left:50%;transform:translateX(-50%);text-align:center;z-index:18;}
#boss-body{width:52px;height:86px;background:linear-gradient(180deg,#1a0800,#080300);border:3px solid #400;border-radius:8px 8px 4px 4px;margin:0 auto;position:relative;animation:bbr 2s ease-in-out infinite;}
@keyframes bbr{0%,100%{transform:scaleY(1);}50%{transform:scaleY(1.04);}}
.b-eye{position:absolute;width:12px;height:12px;background:red;border-radius:50%;top:20px;box-shadow:0 0 16px red;animation:eg .3s infinite alternate;}
.b-eye.L{left:6px;}.b-eye.R{right:6px;}
#boss-name{font-size:9px;color:#800;letter-spacing:3px;margin-bottom:3px;}
#boss-hp-w{width:120px;height:7px;background:#1a0000;border:1px solid #500;border-radius:4px;overflow:hidden;margin:6px auto 0;}
#boss-hp-f{height:100%;background:linear-gradient(90deg,#600,#f00);transition:width .5s;}
#family-ico{position:absolute;bottom:80px;right:14px;font-size:26px;opacity:.8;}
#km-boss{position:absolute;bottom:77px;left:26px;}

/* final choice */
#final-choice{position:absolute;inset:0;background:rgba(0,0,0,.93);z-index:4000;display:none;flex-direction:column;align-items:center;justify-content:center;padding:22px;gap:13px;}
.fc-desc{font-size:12px;color:#aaa;text-align:center;line-height:1.8;font-family:'Sarabun';font-weight:300;}
.fc-btn{width:100%;padding:13px;border-radius:5px;border:none;font-family:'Kanit';font-weight:700;font-size:13px;cursor:pointer;transition:all .2s;}
#fc-dark{background:linear-gradient(135deg,#2a0000,#500);color:#ff8080;border:2px solid #800;}
#fc-good{background:linear-gradient(135deg,#021002,#0d2008);color:#80ff80;border:2px solid #1a4010;}

/* SC10: apartment */
#sc10{background:#050608;}
#apt-hall{position:absolute;inset:0;background:linear-gradient(180deg,#050608,#070710);}
#apt-scroll{position:absolute;bottom:0;left:0;height:100%;}
.apt-wall-line{position:absolute;top:0;bottom:0;width:100%;background:repeating-linear-gradient(90deg,#0a0a0c,#0a0a0c 1px,transparent 1px,transparent 58px);}
.apt-door{position:absolute;bottom:42px;width:42px;height:66px;background:#0d0e10;border:2px solid #1a1a20;border-radius:3px 3px 0 0;}
.apt-door-n{position:absolute;top:7px;left:50%;transform:translateX(-50%);font-size:8px;color:#333;}
.apt-door-k{position:absolute;top:50%;right:5px;transform:translateY(-50%);width:7px;height:7px;background:#2a2a2a;border-radius:50%;}
#door303{position:absolute;bottom:42px;width:42px;height:66px;background:#0f1012;border:2px solid #c8a000;border-radius:3px 3px 0 0;box-shadow:0 0 14px rgba(200,160,0,.14);cursor:pointer;z-index:35;}
#door303-n{position:absolute;top:7px;left:50%;transform:translateX(-50%);font-size:8px;color:#c8a000;}
#door303-k{position:absolute;top:50%;right:5px;transform:translateY(-50%);width:7px;height:7px;background:#c8a000;border-radius:50%;box-shadow:0 0 5px #c8a000;}
.apt-floor{position:absolute;bottom:0;left:0;right:0;height:42px;background:linear-gradient(180deg,#0a0c0d,#050608);border-top:2px solid #111;}

/* ghost reveal */
#ghost-rev{position:absolute;inset:0;display:none;z-index:7000;background:rgba(0,0,0,0);transition:background 1.5s;}
#ghost-ico{position:absolute;top:28%;left:50%;transform:translateX(-50%);font-size:78px;opacity:0;filter:drop-shadow(0 0 28px rgba(200,200,255,.9));animation:ghapp 2s ease-in-out forwards;}
@keyframes ghapp{0%{opacity:0;transform:translateX(-50%) scale(.4) translateY(40px);}60%{opacity:1;transform:translateX(-50%) scale(1.08) translateY(-8px);}100%{opacity:.9;transform:translateX(-50%) scale(1);}}
/* room 303 + closeup */
#room303-overlay{animation:roomFade .4s ease-in;}
@k
